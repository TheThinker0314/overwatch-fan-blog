<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    {{ partial "seo.html" . }}
    {{ partial "head-additions.html" . }}
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen flex flex-col">
    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white shadow-xl sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-3xl font-extrabold tracking-tight hover:text-blue-200 transition-colors">{{ site.Title }}</a>
        <nav class="space-x-6 text-lg font-medium">
          {{ range site.Menus.main }}
          <a href="{{ .URL }}" class="hover:text-blue-300 transition-colors border-b-2 border-transparent hover:border-blue-300 pb-1">{{ .Name }}</a>
          {{ end }}
        </nav>
      </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-10 w-full shadow-md bg-white rounded-xl my-8 border border-slate-200">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center mt-auto border-t border-slate-800">
      <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
        <p class="mb-4 md:mb-0">&copy; {{ now.Format "2006" }} {{ site.Title }}. All rights reserved.</p>
        <div class="space-x-4 font-medium">
          <a href="#" class="hover:text-blue-400 transition-colors">Privacy Policy</a>
          <a href="#" class="hover:text-blue-400 transition-colors">Terms of Service</a>
          <a href="#" class="hover:text-blue-400 transition-colors">Contact Us</a>
        </div>
      </div>
    </footer>
  </body>
</html>
